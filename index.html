<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget & Expense Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* Cloud canvas — light mode only */
    #cloudCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 1;
      transition: opacity 0.4s;
    }
    [data-theme="dark"] #cloudCanvas { opacity: 0; }

    /* Star canvas — dark mode only */
    #starCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 0.4s;
    }
    [data-theme="dark"] #starCanvas { opacity: 1; }

    /* Ensure all page content sits above the background layer */
    .header, .summary-bar, .main-grid { position: relative; z-index: 1; }
  </style>
</head>
<body>

  <!-- Background: clouds (light) + stars (dark) -->
  <canvas id="starCanvas"></canvas>
  <canvas id="cloudCanvas"></canvas>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1 class="greeting">Hi Alex!</h1>
      <p class="subtitle">June Budget Overview</p>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="themeToggle" title="Toggle dark/light mode" aria-label="Toggle theme">
        <span class="theme-icon">☀️</span>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Settings">⚙️</button>
      <button class="btn-primary" id="openModalBtn">+ Add Expense</button>
    </div>
  </header>

  <!-- Budget Summary Bar -->
  <section class="summary-bar">
    <div class="summary-item">
      <span class="summary-label">BUDGET</span>
      <span class="summary-value" id="budgetDisplay">$2,000.00</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">SPENT</span>
      <span class="summary-value spent" id="spentDisplay">$0.00</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">REMAINING</span>
      <span class="summary-value remaining" id="remainingDisplay">$2,000.00</span>
    </div>
    <div class="budget-bar-wrapper">
      <div class="budget-bar-track">
        <div class="budget-bar-fill" id="budgetBarFill"></div>
      </div>
      <span class="budget-bar-label">Budget used</span>
      <span class="budget-bar-percent" id="budgetBarPercent">0%</span>
    </div>
  </section>

  <!-- Main Content -->
  <main class="main-grid">

    <!-- Pie Chart -->
    <section class="card chart-card">
      <h2 class="card-title">Spending by Category</h2>
      <div class="chart-container">
        <canvas id="spendingChart"></canvas>
        <p class="chart-empty" id="chartEmpty">No transactions yet</p>
      </div>
      <div class="chart-legend" id="chartLegend"></div>
    </section>

    <!-- Transactions -->
    <section class="card transactions-card">
      <div class="transactions-header">
        <h2 class="card-title">Transactions</h2>
        <div class="sort-btns">
          <button class="sort-btn active" data-sort="date">Date</button>
          <button class="sort-btn" data-sort="high">$ High</button>
          <button class="sort-btn" data-sort="low">$ Low</button>
          <button class="sort-btn" data-sort="az">A–Z</button>
        </div>
      </div>
      <ul class="transaction-list" id="transactionList">
        <li class="empty-state" id="emptyState">No transactions yet. Add one above!</li>
      </ul>
    </section>

  </main>

  <!-- Add Expense Modal -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Expense</h2>
        <button class="modal-close" id="closeModalBtn" aria-label="Close modal">✕</button>
      </div>
      <form id="expenseForm" novalidate>
        <div class="form-group">
          <label for="itemName">Item Name</label>
          <input type="text" id="itemName" placeholder="e.g. Grocery shopping" autocomplete="off" />
          <span class="field-error" id="nameError"></span>
        </div>
        <div class="form-group">
          <label for="itemAmount">Amount ($)</label>
          <input type="number" id="itemAmount" placeholder="0.00" min="0.01" step="0.01" />
          <span class="field-error" id="amountError"></span>
        </div>
        <div class="form-group">
          <label for="itemCategory">Category</label>
          <select id="itemCategory">
            <option value="">Select a category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills & Utilities">Bills & Utilities</option>
          </select>
          <span class="field-error" id="categoryError"></span>
        </div>

        <!-- Spending limit warning -->
        <div class="limit-warning" id="limitWarning" style="display:none">
          ⚠️ This expense exceeds your spending limit of <strong id="limitDisplay"></strong>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn-primary">Add Expense</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsOverlay" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="modal">
      <div class="modal-header">
        <h2 id="settingsTitle">Settings</h2>
        <button class="modal-close" id="closeSettingsBtn" aria-label="Close settings">✕</button>
      </div>
      <div class="form-group">
        <label for="budgetInput">Monthly Budget ($)</label>
        <input type="number" id="budgetInput" placeholder="2000" min="1" step="1" />
      </div>
      <div class="form-group">
        <label for="spendLimitInput">Spending Limit per Item ($) </small></label>
        <input type="number" id="spendLimitInput" placeholder="0" min="0" step="1" />
      </div>
      <div class="form-group">
        <label for="customCategoryInput">Add Custom Category</label>
        <div class="custom-cat-row">
          <input type="text" id="customCategoryInput" placeholder="e.g. Health" />
          <button type="button" class="btn-primary" id="addCategoryBtn">Add</button>
        </div>
        <ul class="custom-cat-list" id="customCatList"></ul>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-primary" id="saveSettingsBtn">Save Settings</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
